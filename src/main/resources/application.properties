spring.application.name=ProductMicroservice
server.port=0
# Use plural "bootstrap-servers" — "bootstrap-server" is ignored and breaks broker selection.
spring.kafka.bootstrap-servers=localhost:9092,localhost:9094
spring.kafka.admin.auto-create=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Single-broker dev: avoid NotEnoughReplicasException when acks=all
spring.kafka.producer.acks=1
